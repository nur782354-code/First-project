<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple E-Commerce</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f5f5f5}
.card img{height:180px;object-fit:cover}
.hero{background:#111;color:white;padding:60px;border-radius:10px}
footer{background:#111;color:white;padding:20px;text-align:center;margin-top:50px}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="#">ShopMate</a>
<div class="navbar-nav ms-auto">
<a class="nav-link" href="#login">Home</a>
<a class="nav-link" href="#product">Products</a>
<a class="nav-link" href="#login">Login</a>
<a class="nav-link" href="#signup">Sign Up</a>
</div>
</div>
</nav>

<!-- HOME -->
<section id="home" class="container my-5">
<div class="hero text-center">
<h1>Welcome to ShopMate</h1>
<p>Best Products, Best Price</p>
</div>
</section>

<!-- PRODUCTS -->
<section id="products" class="container my-5">
<h2 class="mb-3">Best Selling Products</h2>

<div class="row g-4">
<div class="col-md-4">
<div class="card">
<img src="https://picsum.photos/400/300?1">
<div class="card-body">
<h5>Leather Bag</h5>
<p>$50</p>
<button class="btn btn-dark" onclick="popup()">Add to Cart</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="https://picsum.photos/400/300?2">
<div class="card-body">
<h5>Running Shoe</h5>
<p>$80</p>
<button class="btn btn-dark" onclick="popup()">Add to Cart</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="bb.png">
<div class="card-body">
<h5>Running Shoe</h5>
<p>$80</p>
<button class="btn btn-dark" onclick="popup()">Add to Cart</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="img (2).png">
<div class="card-body">
<h5>Running Shoe</h5>
<p>$80</p>
<button class="btn btn-dark" onclick="popup()">Add to Cart</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="ww.png">
<div class="card-body">
<h5>Running Shoe</h5>
<p>$80</p>
<button class="btn btn-dark" onclick="popup()">Add to Cart</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="https://picsum.photos/400/300?3">
<div class="card-body">
<h5>Smart Watch</h5>
<p>$120</p>
<button class="btn btn-dark" onclick="popup()">Add to Cart</button>
</div>
</div>
</div>
</div>
</section>

<!-- LOGIN -->
<section id="login" class="container my-5">
<h2>Login</h2>
<form class="w-50">
<input class="form-control mb-2" placeholder="Email">
<input class="form-control mb-2" type="password" placeholder="Password">
<button class="btn btn-dark">Login</button>
</form>
</section>

<!-- SIGN UP -->
<section id="signup" class="container my-5">
<h2>Sign Up</h2>
<form class="w-50">
<input class="form-control mb-2" placeholder="Email">
<input class="form-control mb-2" type="password" placeholder="Password">
<input class="form-control mb-2" placeholder="Phone">
<button class="btn btn-dark">Create Account</button>
</form>
</section>

<footer>
 Design by Moriam Mojumder
</footer>

<script>
function popup(){
alert("Product added to cart!");
}
</script>

</body>
</html>
